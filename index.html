  <style>
    body {
      font-family: monospace;
      background-color: #1a1a1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      color: #f7df1e;
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
    }

    #input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 600px;
    }

    #js-input {
      flex: 1;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #f7df1e;
      background-color: #262626;
      color: #f7df1e;
    }

    #run-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      background-color: #f7df1e;
      color: #1a1a1a;
      cursor: pointer;
    }

    #run-btn:hover {
      background-color: #e6d91a;
    }

    textarea {
      width: 100%;
      max-width: 600px;
      height: 150px;
      margin-bottom: 20px;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #f7df1e;
      background-color: #262626;
      color: #f7df1e;
      resize: vertical;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #f7df1e;
    }
  </style>
</head>
<body>
  <h1>JavaScript Runner</h1>
  <p>Enter JavaScript below, run a line at a time, see your history, and view console output separately.</p>

  <!-- Input area -->
  <div id="input-area">
    <input type="text" id="js-input" placeholder="Enter a line of JavaScript">
    <button id="run-btn">Run</button>
  </div>

<!-- History area -->
<label for="history">History:</label>
<textarea id="history" readonly></textarea>
<button id="copy-history-btn">Copy History</button>

  <!-- Console output area -->
  <label for="console">Console Output:</label>
  <textarea id="console" readonly></textarea>

  <script>
    const runBtn = document.getElementById('run-btn');
    const jsInput = document.getElementById('js-input');
    const historyArea = document.getElementById('history');
    const consoleArea = document.getElementById('console');

    runBtn.addEventListener('click', () => {
      const code = jsInput.value.trim();
      if (!code) return;

      // Add to history
      historyArea.value += code + "\n";

      // Run code safely
      try {
        const result = eval(code);
        consoleArea.value += result + "\n";
      } catch (e) {
        consoleArea.value += "Error: " + e + "\n";
      }

      jsInput.value = '';
    });

    // Optional: press Enter to run
    jsInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        runBtn.click();
      }
    });
    
const copyHistoryBtn = document.getElementById('copy-history-btn');

copyHistoryBtn.addEventListener('click', () => {
  const historyText = historyArea.value;
  if (!historyText) return alert("History is empty!");
  
  navigator.clipboard.writeText(historyText).then(() => {
    alert("History copied to clipboard!");
  }).catch(err => {
    alert("Failed to copy: " + err);
  });
});
  </script>
</body>
</html>
